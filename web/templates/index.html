<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>论文优化系统</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1>论文优化系统</h1>
            <p class="subtitle">AI 驱动的学术论文全自动优化</p>
        </header>

        <!-- Step 1: API Key -->
        <section id="key-section" class="section">
            <div class="card">
                <div class="step-indicator">
                    <div class="step active">1</div>
                    <div class="step-line"></div>
                    <div class="step">2</div>
                    <div class="step-line"></div>
                    <div class="step">3</div>
                </div>

                <h2>配置 API Key</h2>
                <p class="desc">请输入您的 Anthropic API Key，用于调用 Claude 模型进行论文优化</p>

                <div class="input-group">
                    <label for="api-key">Anthropic API Key</label>
                    <div class="input-wrapper">
                        <input
                            type="password"
                            id="api-key"
                            placeholder="sk-ant-..."
                            autocomplete="off"
                            spellcheck="false"
                        >
                        <button class="btn-icon" id="btn-toggle-key" title="显示/隐藏">
                            <svg id="eye-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                        </button>
                    </div>
                    <p class="input-hint">Key 仅在当前会话使用，不会被存储到服务器</p>
                </div>

                <button class="btn-primary" id="btn-next" disabled>
                    下一步
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M5 12h14M12 5l7 7-7 7"/>
                    </svg>
                </button>

                <div class="error-msg hidden" id="key-error"></div>
            </div>
        </section>

        <!-- Step 2: Upload -->
        <section id="upload-section" class="section hidden">
            <div class="card">
                <div class="step-indicator">
                    <div class="step done">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                            <path d="M20 6L9 17l-5-5"/>
                        </svg>
                    </div>
                    <div class="step-line done"></div>
                    <div class="step active">2</div>
                    <div class="step-line"></div>
                    <div class="step">3</div>
                </div>

                <h2>上传论文</h2>
                <p class="desc">支持 .tex / .md / .txt 格式</p>

                <div id="drop-zone" class="drop-zone">
                    <div class="drop-icon">
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                            <polyline points="14 2 14 8 20 8"/>
                            <line x1="12" y1="18" x2="12" y2="12"/>
                            <polyline points="9 15 12 12 15 15"/>
                        </svg>
                    </div>
                    <p class="drop-text">拖拽文件到此处，或 <span class="browse-link">点击选择</span></p>
                    <p class="drop-hint">.tex / .md / .txt 文件</p>
                    <input type="file" id="file-input" accept=".tex,.md,.txt" hidden>
                </div>

                <div id="file-info" class="file-info hidden">
                    <div class="file-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                            <polyline points="14 2 14 8 20 8"/>
                        </svg>
                    </div>
                    <span class="file-name" id="file-name"></span>
                    <button class="btn-icon btn-remove" id="btn-remove" title="移除">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="18" y1="6" x2="6" y2="18"/>
                            <line x1="6" y1="6" x2="18" y2="18"/>
                        </svg>
                    </button>
                </div>

                <div class="options">
                    <div class="option-group">
                        <label for="discipline">学科类别</label>
                        <select id="discipline">
                            <option value="cs">计算机科学</option>
                            <option value="ee">电子工程</option>
                            <option value="me">机械工程</option>
                            <option value="general" selected>通用</option>
                        </select>
                    </div>
                    <div class="option-group">
                        <label for="citation">引用格式</label>
                        <select id="citation">
                            <option value="gb/t 7714" selected>GB/T 7714</option>
                            <option value="apa">APA</option>
                            <option value="ieee">IEEE</option>
                            <option value="mla">MLA</option>
                        </select>
                    </div>
                </div>

                <div class="btn-row">
                    <button class="btn-secondary" id="btn-back">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M19 12H5M12 19l-7-7 7-7"/>
                        </svg>
                        返回
                    </button>
                    <button class="btn-primary flex-1" id="btn-upload" disabled>
                        开始优化
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
                        </svg>
                    </button>
                </div>

                <div class="error-msg hidden" id="upload-error"></div>
            </div>
        </section>

        <!-- Step 3: Progress -->
        <section id="progress-section" class="section hidden">
            <div class="card">
                <div class="step-indicator">
                    <div class="step done">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                            <path d="M20 6L9 17l-5-5"/>
                        </svg>
                    </div>
                    <div class="step-line done"></div>
                    <div class="step done">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                            <path d="M20 6L9 17l-5-5"/>
                        </svg>
                    </div>
                    <div class="step-line done"></div>
                    <div class="step active">3</div>
                </div>

                <h2>优化进行中</h2>

                <div class="progress-bar-container">
                    <div class="progress-bar" id="progress-bar"></div>
                </div>

                <div class="progress-info">
                    <span class="progress-text" id="progress-text">准备中...</span>
                    <span class="progress-percent" id="progress-percent">0%</span>
                </div>

                <div class="stages">
                    <div class="stage" data-stage="analyze">
                        <div class="stage-dot"></div>
                        <span>分析</span>
                    </div>
                    <div class="stage" data-stage="reduce_ai">
                        <div class="stage-dot"></div>
                        <span>降AI</span>
                    </div>
                    <div class="stage" data-stage="reduce_plagiarism">
                        <div class="stage-dot"></div>
                        <span>降重</span>
                    </div>
                    <div class="stage" data-stage="polish">
                        <div class="stage-dot"></div>
                        <span>润色</span>
                    </div>
                    <div class="stage" data-stage="check_format">
                        <div class="stage-dot"></div>
                        <span>格式</span>
                    </div>
                    <div class="stage" data-stage="evaluate">
                        <div class="stage-dot"></div>
                        <span>评估</span>
                    </div>
                </div>
            </div>
        </section>

        <!-- Result Section -->
        <section id="result-section" class="section hidden">
            <div class="card">
                <h2>
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="2">
                        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
                        <path d="M22 4L12 14.01l-3-3"/>
                    </svg>
                    优化完成
                </h2>

                <div class="result-tabs">
                    <button class="tab active" data-tab="evaluation">评估报告</button>
                    <button class="tab" data-tab="analysis">分析报告</button>
                    <button class="tab" data-tab="format">格式报告</button>
                    <button class="tab" data-tab="logs">修订日志</button>
                </div>

                <div class="tab-content" id="tab-content">
                    <div id="tab-evaluation" class="tab-pane active"></div>
                    <div id="tab-analysis" class="tab-pane"></div>
                    <div id="tab-format" class="tab-pane"></div>
                    <div id="tab-logs" class="tab-pane"></div>
                </div>

                <div class="result-actions">
                    <button class="btn-primary" id="btn-download">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                            <polyline points="7 10 12 15 17 10"/>
                            <line x1="12" y1="15" x2="12" y2="3"/>
                        </svg>
                        下载全部结果 (.zip)
                    </button>
                    <button class="btn-secondary" id="btn-new">优化另一篇论文</button>
                </div>
            </div>
        </section>

        <!-- Error Section -->
        <section id="error-section" class="section hidden">
            <div class="card error-card">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2">
                    <circle cx="12" cy="12" r="10"/>
                    <line x1="15" y1="9" x2="9" y2="15"/>
                    <line x1="9" y1="9" x2="15" y2="15"/>
                </svg>
                <h2>出错了</h2>
                <p id="error-message"></p>
                <button class="btn-primary" id="btn-retry">重新开始</button>
            </div>
        </section>
    </div>

    <footer class="footer">
        <p>论文优化系统 &mdash; 由 Claude AI 驱动</p>
    </footer>

    <script src="/static/js/app.js"></script>
</body>
</html>
